<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Admin · IDEAL BRO</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="grain"></div>

  <main class="admin-show-page">
    <section class="lock-card" id="adminLockScreen">
      <span class="lock-icon">🔒</span>
      <h2>Admin access</h2>
      <p class="sub">Введи пароль организатора.</p>
      <input id="adminCodeInput" class="input code" type="password" placeholder="Пароль" autocomplete="off" />
      <button class="btn primary full" id="adminUnlockBtn">Открыть админ-панель →</button>
      <p id="adminErrorText" class="error hidden">Пароль неверный.</p>
    </section>

    <section class="admin-show-card hidden" id="adminPanel">
      <div class="admin-show-head">
        <p class="kicker">АДМИН-ПРОТОКОЛ</p>

        <div class="source-toggle">
          <button class="source-btn active" data-source="real">Боевой режим</button>
          <button class="source-btn" data-source="sandbox">Запуск теста</button>
        </div>
      </div>

      <div class="game-tabs">
        <button class="game-tab" data-game="1">Игра 1</button>
        <button class="game-tab" data-game="2">Игра 2</button>
        <button class="game-tab" data-game="3">Игра 3</button>
      </div>

      <div class="admin-stage" id="stage">
        <div class="admin-big-mark">✦</div>
        <h1 id="stageTitle">Протокол готов</h1>
        <p id="stageText">Загрузи результаты теста, чтобы начать формирование групп.</p>

        <div class="admin-main-actions" id="mainActions">
          <button class="btn primary" id="loadBtn">Загрузить результаты</button>
          <button class="btn ghost" id="seedBtn">Заполнить sandbox</button>
          <button class="btn ghost" id="resetBtn">Начать сначала</button>
        </div>

        <div class="admin-loader hidden" id="loader">
          <div class="loader-ring"></div>
          <p id="loaderText">Подключаемся к протоколу...</p>
        </div>

        <div class="admin-output" id="output"></div>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
